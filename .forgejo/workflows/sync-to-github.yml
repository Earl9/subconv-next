name: Sync main to GitHub

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

concurrency:
  group: sync-main-to-github
  cancel-in-progress: true

jobs:
  sync:
    runs-on: docker

    steps:
      - name: Checkout Forgejo repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push main only to GitHub
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          set -euo pipefail

          git config user.name "forgejo-actions"
          git config user.email "forgejo-actions@example.local"

          git remote remove github 2>/dev/null || true
          git remote add github "https://x-access-token:${GH_TOKEN}@github.com/Earl9/subconv-next.git"

          git push --force-with-lease github HEAD:refs/heads/main