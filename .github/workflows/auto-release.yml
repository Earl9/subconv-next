name: auto-release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      reset_v1_versions:
        description: Delete v1.0.1+ releases/tags before publishing
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  packages: write

concurrency:
  group: auto-release-main
  cancel-in-progress: true

jobs:
  release:
    if: ${{ github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[skip release]') }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Reset v1 release versions
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.reset_v1_versions }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          release_tags="$(
            gh release list --limit 100 --json tagName --jq '.[].tagName' |
              sed -n 's/^v1\.0\.\([0-9][0-9]*\)$/\1 &/p' |
              awk '$1 > 0 {print $2}'
          )"
          git_tags="$(
            git ls-remote --tags origin 'refs/tags/v1.0.*' |
              awk '{print $2}' |
              sed 's#refs/tags/##; s#\\^{}##' |
              sed -n 's/^v1\.0\.\([0-9][0-9]*\)$/\1 &/p' |
              awk '$1 > 0 {print $2}'
          )"
          stale_tags="$(
            printf '%s\n%s\n' "${release_tags}" "${git_tags}" |
              sed '/^$/d' |
              sort -u
          )"
          for tag in ${stale_tags}; do
            if gh release view "${tag}" >/dev/null 2>&1; then
              echo "Deleting stale failed release: ${tag}"
              gh release delete "${tag}" --cleanup-tag --yes
            fi
            if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
              echo "Deleting stale failed release tag: ${tag}"
              git push origin ":refs/tags/${tag}"
            fi
            git tag -d "${tag}" >/dev/null 2>&1 || true
          done

      - name: Compute version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          git fetch --force --tags origin 'refs/tags/v1.0.*:refs/tags/v1.0.*'
          latest_patch="$(
            git tag --list 'v1.0.*' |
              sed -n 's/^v1\.0\.\([0-9][0-9]*\)$/\1/p' |
              sort -n |
              tail -n 1
          )"
          if [ -z "${latest_patch}" ]; then
            latest_patch=0
          fi
          version="1.0.$((latest_patch + 1))"
          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=v${version}" >> "$GITHUB_OUTPUT"
          echo "image=${image}" >> "$GITHUB_OUTPUT"

      - name: Test
        run: |
          test -z "$(gofmt -l $(find . -path './.git' -prune -o -path './.tmpinspect' -prune -o -path './vendor' -prune -o -name '*.go' -print))"
          node --check internal/api/static/app.js
          go test ./...
          go vet ./...

      - name: Build release binaries
        env:
          VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist

          build() {
            local name="$1"
            shift
            env CGO_ENABLED=0 GOOS=linux "$@" go build \
              -trimpath \
              -ldflags="-s -w -X main.version=${VERSION}" \
              -o "dist/${name}" ./cmd/subconv-next
          }

          build subconv-next-linux-amd64 GOARCH=amd64
          build subconv-next-linux-arm64 GOARCH=arm64
          build subconv-next-linux-armv7 GOARCH=arm GOARM=7
          build subconv-next-linux-mips-softfloat GOARCH=mips GOMIPS=softfloat
          build subconv-next-linux-mipsle-softfloat GOARCH=mipsle GOMIPS=softfloat

      - name: Build OpenWrt IPK
        env:
          VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/openwrt-arm64
          install -m0755 dist/subconv-next-linux-arm64 dist/openwrt-arm64/subconv-next
          VERSION="${VERSION}" RELEASE=1 ARCH=aarch64_generic \
            ./scripts/package-openwrt-ipk-portable.sh dist/openwrt-arm64/subconv-next

      - name: Generate checksums
        run: |
          (cd dist && sha256sum subconv-next-* subconv-next_*.ipk > checksums.txt)

      - name: Publish Docker image
        id: docker_login
        continue-on-error: true
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME || github.actor }}
          password: ${{ secrets.GHCR_TOKEN || github.token }}

      - name: Build and push Docker image
        id: docker_push
        if: ${{ steps.docker_login.outcome == 'success' }}
        continue-on-error: true
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            SOURCE_REPOSITORY=https://github.com/${{ github.repository }}
          tags: |
            ${{ steps.version.outputs.image }}:latest
            ${{ steps.version.outputs.image }}:${{ steps.version.outputs.version }}

      - name: Create release notes
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
          IMAGE: ${{ steps.version.outputs.image }}
          DOCKER_LOGIN_RESULT: ${{ steps.docker_login.outcome }}
          DOCKER_PUSH_RESULT: ${{ steps.docker_push.outcome }}
        shell: bash
        run: |
          set -euo pipefail
          cat > release-notes.md <<EOF_NOTES
          # SubConv Next ${TAG}

          Automated release from \`${GITHUB_SHA}\`.

          EOF_NOTES

          if [ "${DOCKER_LOGIN_RESULT}" = "success" ] && [ "${DOCKER_PUSH_RESULT}" = "success" ]; then
            cat >> release-notes.md <<EOF_NOTES
          Docker image:

          - \`${IMAGE}:latest\`
          - \`${IMAGE}:${VERSION}\`

          EOF_NOTES
          else
            cat >> release-notes.md <<EOF_NOTES
          Docker image:

          - GHCR publish did not complete. If the workflow log shows \`permission_denied: write_package\`, grant this repository write access to the GHCR package or configure \`GHCR_TOKEN\` with \`write:packages\`.

          EOF_NOTES
          fi

          cat >> release-notes.md <<EOF_NOTES
          Assets:

          - \`subconv-next-linux-amd64\`
          - \`subconv-next-linux-arm64\`
          - \`subconv-next-linux-armv7\`
          - \`subconv-next-linux-mips-softfloat\`
          - \`subconv-next-linux-mipsle-softfloat\`
          - \`subconv-next_${VERSION}-1_aarch64_generic.ipk\`
          - \`checksums.txt\`
          EOF_NOTES

      - name: Create Git tag
        env:
          TAG: ${{ steps.version.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists. Refusing to overwrite an existing release tag." >&2
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "Release ${TAG}"
          git push origin "${TAG}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          gh release create "${TAG}" \
            --title "SubConv Next ${TAG}" \
            --notes-file release-notes.md \
            dist/subconv-next-linux-amd64 \
            dist/subconv-next-linux-arm64 \
            dist/subconv-next-linux-armv7 \
            dist/subconv-next-linux-mips-softfloat \
            dist/subconv-next-linux-mipsle-softfloat \
            "dist/subconv-next_${{ steps.version.outputs.version }}-1_aarch64_generic.ipk" \
            dist/checksums.txt
