name: release

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: Release version, for example 1.0.7
        required: true
        type: string

permissions:
  contents: write
  packages: write

concurrency:
  group: release-main
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: 1.25.12

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Compute version
        id: version
        env:
          RELEASE_VERSION: ${{ inputs.release_version }}
        shell: bash
        run: |
          set -euo pipefail
          requested_version="${RELEASE_VERSION#v}"
          if [[ ! "${requested_version}" =~ ^1\.0\.[0-9]+$ ]]; then
            echo "release_version must match 1.0.N (for example 1.0.7)" >&2
            exit 1
          fi
          version="${requested_version}"
          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=v${version}" >> "$GITHUB_OUTPUT"
          echo "image=${image}" >> "$GITHUB_OUTPUT"

      - name: Test
        run: |
          test -z "$(gofmt -l $(find . -path './.git' -prune -o -path './.tmpinspect' -prune -o -path './vendor' -prune -o -name '*.go' -print))"
          node --check internal/api/static/app.js
          go test ./...
          go vet ./...

      - name: Build release binaries
        env:
          VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist

          build() {
            local name="$1"
            shift
            env CGO_ENABLED=0 GOOS=linux "$@" go build \
              -trimpath \
              -ldflags="-s -w -X main.version=${VERSION}" \
              -o "dist/${name}" ./cmd/subconv-next
          }

          build subconv-next-linux-amd64 GOARCH=amd64
          build subconv-next-linux-arm64 GOARCH=arm64
          build subconv-next-linux-armv7 GOARCH=arm GOARM=7
          build subconv-next-linux-mips-softfloat GOARCH=mips GOMIPS=softfloat
          build subconv-next-linux-mipsle-softfloat GOARCH=mipsle GOMIPS=softfloat

      - name: Build OpenWrt IPK
        env:
          VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/openwrt-arm64
          install -m0755 dist/subconv-next-linux-arm64 dist/openwrt-arm64/subconv-next
          VERSION="${VERSION}" RELEASE=1 ARCH=aarch64_generic \
            ./scripts/package-openwrt-ipk-portable.sh dist/openwrt-arm64/subconv-next

      - name: Generate checksums
        run: |
          (cd dist && sha256sum subconv-next-* subconv-next_*.ipk > checksums.txt)

      - name: Publish Docker image
        id: docker_login
        continue-on-error: true
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME || github.actor }}
          password: ${{ secrets.GHCR_TOKEN || github.token }}

      - name: Build and push Docker image
        id: docker_push
        if: ${{ steps.docker_login.outcome == 'success' }}
        continue-on-error: true
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            SOURCE_REPOSITORY=https://github.com/${{ github.repository }}
          tags: |
            ${{ steps.version.outputs.image }}:latest
            ${{ steps.version.outputs.image }}:${{ steps.version.outputs.version }}

      - name: Create release notes
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
          IMAGE: ${{ steps.version.outputs.image }}
          DOCKER_LOGIN_RESULT: ${{ steps.docker_login.outcome }}
          DOCKER_PUSH_RESULT: ${{ steps.docker_push.outcome }}
        shell: bash
        run: |
          set -euo pipefail
          cat > release-notes.md <<EOF_NOTES
          # SubConv Next ${TAG}

          Automated release from \`${GITHUB_SHA}\`.

          EOF_NOTES

          if [ "${DOCKER_LOGIN_RESULT}" = "success" ] && [ "${DOCKER_PUSH_RESULT}" = "success" ]; then
            cat >> release-notes.md <<EOF_NOTES
          Docker image:

          - \`${IMAGE}:latest\`
          - \`${IMAGE}:${VERSION}\`

          EOF_NOTES
          else
            cat >> release-notes.md <<EOF_NOTES
          Docker image:

          - GHCR publish did not complete. If the workflow log shows \`permission_denied: write_package\`, grant this repository write access to the GHCR package or configure \`GHCR_TOKEN\` with \`write:packages\`.

          EOF_NOTES
          fi

          cat >> release-notes.md <<EOF_NOTES
          Assets:

          - \`subconv-next-linux-amd64\`
          - \`subconv-next-linux-arm64\`
          - \`subconv-next-linux-armv7\`
          - \`subconv-next-linux-mips-softfloat\`
          - \`subconv-next-linux-mipsle-softfloat\`
          - \`subconv-next_${VERSION}-1_aarch64_generic.ipk\`
          - \`checksums.txt\`
          EOF_NOTES

      - name: Create draft GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          if gh release view "${TAG}" >/dev/null 2>&1; then
            echo "Release ${TAG} already exists. Refusing to overwrite it." >&2
            exit 1
          fi
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists. Refusing to overwrite it." >&2
            exit 1
          fi
          gh release create "${TAG}" \
            --draft \
            --target "${GITHUB_SHA}" \
            --title "SubConv Next ${TAG}" \
            --notes-file release-notes.md \
            dist/subconv-next-linux-amd64 \
            dist/subconv-next-linux-arm64 \
            dist/subconv-next-linux-armv7 \
            dist/subconv-next-linux-mips-softfloat \
            dist/subconv-next-linux-mipsle-softfloat \
            "dist/subconv-next_${{ steps.version.outputs.version }}-1_aarch64_generic.ipk" \
            dist/checksums.txt

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
        run: gh release edit "${TAG}" --draft=false --latest
