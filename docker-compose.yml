services:
  subconv-next:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: subconv-next
    restart: unless-stopped
    ports:
      - "0.0.0.0:9876:9876"
    volumes:
      - ./config:/config
      - ./data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9876/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
