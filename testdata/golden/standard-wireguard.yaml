mixed-port: 7890
allow-lan: false
mode: rule
log-level: info
ipv6: false
dns:
    enable: true
    ipv6: false
    enhanced-mode: fake-ip
    nameserver:
        - https://1.1.1.1/dns-query
        - https://8.8.8.8/dns-query
proxies:
    - name: wg-node
      type: wireguard
      server: example.com
      port: 51820
      udp: true
      ip: 172.16.0.2/32
      ipv6: fd00::2/128
      private-key: private-key
      public-key: server-key
      allowed-ips:
        - 0.0.0.0/0
        - ::/0
      reserved:
        - 209
        - 98
        - 59
      mtu: 1280
      dns:
        - 1.1.1.1
proxy-groups:
    - name: 自动选择
      type: url-test
      proxies:
        - wg-node
      url: https://www.gstatic.com/generate_204
      interval: 300
    - name: 故障转移
      type: fallback
      proxies:
        - wg-node
      url: https://www.gstatic.com/generate_204
      interval: 300
    - name: 节点选择
      type: select
      proxies:
        - 自动选择
        - 故障转移
        - DIRECT
        - wg-node
    - name: AI
      type: select
      proxies:
        - 节点选择
        - 自动选择
        - 故障转移
        - DIRECT
    - name: 流媒体
      type: select
      proxies:
        - 节点选择
        - 自动选择
        - 故障转移
        - DIRECT
    - name: Telegram
      type: select
      proxies:
        - 节点选择
        - 自动选择
        - 故障转移
        - DIRECT
    - name: GitHub
      type: select
      proxies:
        - 节点选择
        - 自动选择
        - 故障转移
        - DIRECT
    - name: Microsoft
      type: select
      proxies:
        - 节点选择
        - 自动选择
        - 故障转移
        - DIRECT
    - name: Apple
      type: select
      proxies:
        - 节点选择
        - 自动选择
        - 故障转移
        - DIRECT
    - name: 国内直连
      type: select
      proxies:
        - DIRECT
        - 节点选择
    - name: 漏网之鱼
      type: select
      proxies:
        - 节点选择
        - 自动选择
        - DIRECT
rules:
    - GEOSITE,telegram,Telegram
    - GEOSITE,github,GitHub
    - GEOSITE,microsoft,Microsoft
    - GEOSITE,apple,Apple
    - GEOSITE,openai,AI
    - GEOSITE,netflix,流媒体
    - GEOSITE,private,DIRECT
    - GEOIP,private,DIRECT,no-resolve
    - GEOSITE,cn,国内直连
    - GEOIP,CN,国内直连
    - MATCH,漏网之鱼
