mixed-port: 7897

allow-lan: true

mode: rule

log-level: info

ipv6: false

unified-delay: true

tcp-concurrent: true

find-process-mode: strict

global-client-fingerprint: chrome

dns:
  enable: true
  listen: 127.0.0.1:5335
  use-system-hosts: false
  ipv6: false
  enhanced-mode: fake-ip
  default-nameserver: [119.29.29.29, 223.5.5.5]
  nameserver-policy:
    '*.linux.do': https://xxx.ddd.oaifree.com/query-dns
    geosite:cn,private,apple:
      - https://doh.pub/dns-query
      - https://dns.alidns.com/dns-query
    linux.do: https://xxx.ddd.oaifree.com/query-dns
  nameserver: ['https://1.1.1.1/dns-query#RULES', 'https://8.8.8.8/dns-query#RULES']
  proxy-server-nameserver: [119.29.29.29, 223.5.5.5]
  direct-nameserver: ['https://doh.pub/dns-query', 'https://dns.alidns.com/dns-query']
  direct-nameserver-follow-policy: true
  fake-ip-range: 198.18.0.0/16
  fake-ip-filter: ['*.lan', '*.local', '*.arpa', time.*.com, ntp.*.com, +.market.xiaomi.com, localhost.ptlogin2.qq.com, '*.msftncsi.com', www.msftconnecttest.com]

profile:
  store-selected: true
  store-fake-ip: false

sniffer:
  enable: true
  parse-pure-ip: true
  sniff:
    HTTP:
      ports:
        - 80
        - 8080-8880
      override-destination: true
    QUIC:
      ports:
        - 443
        - 8443
    TLS:
      ports:
        - 443
        - 8443

geodata-mode: true

geo-auto-update: true

geodata-loader: standard

geo-update-interval: 24

geox-url:
  geoip: https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.dat
  geosite: https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geosite.dat
  mmdb: https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/country.mmdb
  asn: https://github.com/xishang0128/geoip/releases/download/latest/GeoLite2-ASN.mmdb

proxies:
  - {name: ss-node, type: ss, server: example.com, port: 443, cipher: aes-256-gcm, password: pass, udp: true}

proxy-groups:
  - {name: "🚀 节点选择", type: select, proxies: [⚡ 自动选择, DIRECT, REJECT, ss-node]}
  - {name: ⚡ 自动选择, type: url-test, proxies: [ss-node], url: 'https://www.gstatic.com/generate_204', interval: 300, lazy: false}
  - {name: "🐟 漏网之鱼", type: select, proxies: ["🚀 节点选择", ⚡ 自动选择, DIRECT, REJECT]}

rules:
  - "MATCH,🐟 漏网之鱼"
