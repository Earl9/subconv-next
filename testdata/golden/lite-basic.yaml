mixed-port: 7897

allow-lan: true

mode: rule

log-level: info

ipv6: false

unified-delay: true

tcp-concurrent: false

find-process-mode: strict

global-client-fingerprint: chrome

dns:
  enable: true
  listen: 127.0.0.1:5335
  use-hosts: true
  ipv6: false
  respect-rules: false
  enhanced-mode: fake-ip
  default-nameserver: [223.5.5.5, 119.29.29.29]
  nameserver: [223.5.5.5, 119.29.29.29]
  fake-ip-range: 198.18.0.1/16
  fallback: ['https://dns.alidns.com/dns-query']
  fake-ip-filter: ['*.lan', '*.local', localhost, '*.msftconnecttest.com', '*.msftncsi.com', '*.nintendo.net', '*.playstation.net', '*.xboxlive.com', stun.*, time.*]

profile:
  store-selected: true
  store-fake-ip: false

sniffer:
  enable: true
  parse-pure-ip: false
  sniff:
    HTTP:
      ports:
        - 80
        - 8080-8880
      override-destination: true
    TLS:
      ports:
        - 443
        - 8443

proxies:
  - {name: ss-node, type: ss, server: example.com, port: 443, cipher: aes-256-gcm, password: pass, udp: true}

proxy-groups:
  - {name: "🚀 节点选择", type: select, proxies: [⚡ 自动选择, DIRECT, REJECT, ss-node]}
  - {name: ⚡ 自动选择, type: url-test, proxies: [ss-node], url: 'https://www.gstatic.com/generate_204', interval: 300, lazy: false}
  - {name: "🐟 漏网之鱼", type: select, proxies: ["🚀 节点选择", ⚡ 自动选择, DIRECT, REJECT]}

rules:
  - "MATCH,🐟 漏网之鱼"
