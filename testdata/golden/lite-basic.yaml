mixed-port: 7890
allow-lan: false
mode: rule
log-level: info
ipv6: false
dns:
    enable: true
    ipv6: false
    enhanced-mode: fake-ip
    nameserver:
        - https://1.1.1.1/dns-query
        - https://8.8.8.8/dns-query
proxies:
    - name: ss-node
      type: ss
      server: example.com
      port: 443
      cipher: aes-256-gcm
      password: pass
      udp: true
proxy-groups:
    - name: 自动选择
      type: url-test
      proxies:
        - ss-node
      url: https://www.gstatic.com/generate_204
      interval: 300
    - name: 节点选择
      type: select
      proxies:
        - 自动选择
        - DIRECT
        - REJECT
        - ss-node
rules:
    - GEOSITE,private,DIRECT
    - GEOIP,private,DIRECT,no-resolve
    - GEOSITE,cn,DIRECT
    - GEOIP,CN,DIRECT
    - MATCH,节点选择
