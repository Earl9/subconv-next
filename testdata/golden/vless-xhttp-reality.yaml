profile:
  store-selected: true
  store-fake-ip: false

sniffer:
  enable: true
  parse-pure-ip: true
  sniff:
    HTTP:
      ports:
        - 80
        - 8080-8880
      override-destination: true
    QUIC:
      ports:
        - 443
        - 8443
    TLS:
      ports:
        - 443
        - 8443

geodata-mode: true

geo-auto-update: true

geodata-loader: standard

geo-update-interval: 24

geox-url:
  geoip: https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.dat
  geosite: https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geosite.dat
  mmdb: https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/country.mmdb
  asn: https://github.com/xishang0128/geoip/releases/download/latest/GeoLite2-ASN.mmdb

proxies:
  - {name: xhttp, type: vless, server: example.com, port: 443, encryption: none, uuid: uuid-1, network: xhttp, tls: true, udp: true, servername: example.com, client-fingerprint: chrome, reality-opts: {public-key: pub, short-id: abcd, spider-x: /spider}, xhttp-opts: {path: /demo, mode: auto, no-grpc-header: false}}

