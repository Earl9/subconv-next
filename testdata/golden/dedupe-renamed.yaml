mixed-port: 7897

allow-lan: true

mode: rule

log-level: info

ipv6: false

unified-delay: true

tcp-concurrent: false

find-process-mode: strict

global-client-fingerprint: chrome

dns:
  enable: true
  listen: 127.0.0.1:5335
  use-hosts: true
  ipv6: false
  respect-rules: false
  enhanced-mode: fake-ip
  default-nameserver: [223.5.5.5, 119.29.29.29]
  nameserver: [223.5.5.5, 119.29.29.29]
  fake-ip-range: 198.18.0.1/16
  fallback: ['https://dns.alidns.com/dns-query']
  fake-ip-filter: ['*.lan', '*.local', localhost, '*.msftconnecttest.com', '*.msftncsi.com', '*.nintendo.net', '*.playstation.net', '*.xboxlive.com', stun.*, time.*]

profile:
  store-selected: true
  store-fake-ip: false

sniffer:
  enable: true
  parse-pure-ip: false
  sniff:
    HTTP:
      ports:
        - 80
        - 8080-8880
      override-destination: true
    TLS:
      ports:
        - 443
        - 8443

proxies:
    - name: dup
      type: trojan
      server: one.example.com
      port: 443
      password: a
      tls: true
      udp: true
      sni: one.example.com
      skip-cert-verify: false
    - name: 'dup #2'
      type: trojan
      server: two.example.com
      port: 443
      password: b
      tls: true
      udp: true
      sni: two.example.com
      skip-cert-verify: false
proxy-groups:
    - name: ⚡ 自动选择
      type: url-test
      proxies:
        - dup
        - 'dup #2'
      url: https://www.gstatic.com/generate_204
      interval: 300
    - name: 🚀 节点选择
      type: select
      proxies:
        - ⚡ 自动选择
        - DIRECT
        - REJECT
        - dup
        - 'dup #2'
rules:
    - GEOSITE,private,DIRECT
    - GEOIP,private,DIRECT,no-resolve
    - GEOSITE,cn,DIRECT
    - GEOIP,CN,DIRECT
    - MATCH,🚀 节点选择
